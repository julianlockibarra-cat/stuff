<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/TemplateData/style.css"> 
<script src="https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/TemplateData/UnityProgress.js"></script> 
<script src="https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/UnityLoader.js"></script> 

<script> 
  var gameInstance = UnityLoader.instantiate(
    "gameContainer", 
    "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.json", 
    {
      onProgress: UnityProgress,
      Module: {
        // Absolute map for every file required by Unity's WebGL loader engine
        dataUrl: "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.data.unityweb",
        wasmCodeUrl: "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.wasm.code.unityweb",
        wasmFrameworkUrl: "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.wasm.framework.unityweb",
        asmCodeUrl: "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.wasm.code.unityweb",
        asmFrameworkUrl: "https://cdn.jsdelivr.net/gh/itsvijaysingh/Snow-Rider3D@main/Build/SnowRider3D-gd-1.wasm.framework.unityweb",
        
        onRuntimeInitialized: function() {
          UnityProgress(gameInstance, "complete");
        }
      }
    }
  ); 
</script> 

<div class="webgl-content"> 
  <div id="gameContainer" style="width: 100%; height: 100%; margin: auto"></div> 
</div>
