<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arcade Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0d1a;
            --panel-bg: #1a1a3a;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --neon-green: #39ff14;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-align: center;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .controls {
            margin-bottom: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-all {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            transition: all 0.3s ease;
        }

        .btn-all:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .btn-download {
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 80%;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.2);
        }

        .btn-download:hover {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-magenta);
        }
        
        #status-msg {
            margin-top: 15px;
            color: var(--neon-cyan);
            font-weight: bold;
            min-height: 20px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>NEON GAME DOWNLOAD</h1>
    <div class="subtitle">Unblocked fun games!</div>

    <div class="controls">
        <button class="btn-all" id="download-all-btn">⚡DOWNLOAD ALL GAMES⚡</button>
        <div id="status-msg"></div>
    </div>

    <div class="grid" id="games-grid"></div>

    <script>
        // --- CONFIGURATION ---
        const username = "julianlockibarra-cat";
        const repoName = "games"; 
        const branch = "4a6ff8b19bdd640ef1f2887ff360878879202008"; 
        
        // List of all game files (Added 'PAPERio3D.html')
        const gameFiles = [
            "2048.html", "ANGRYbirds.html", "DINOrun.html", "DRIVEMAD.html", 
            "GD subzero.html", "GDworld.html", "PARKOROBBY.html", "POPOPKITTIES.html", 
            "SAB2.html", "brainrotmerge.html", "cookieclicker.html", "crossyroad.html", 
            "eaglercraft.html", "fakesab.html", "flappybird.html", "flappy dunk.html", 
            "geometry dash.html", "paper io.html", "paperiomania.html", "PAPERio3D.html", 
            "slimerancher.html", "snowrider3d.html"
        ];

        const baseUrl = `https://cdn.jsdelivr.net/gh/${username}/${repoName}@${branch}/`;
        const grid = document.getElementById('games-grid');
        const statusMsg = document.getElementById('status-msg');

        function cleanTitle(fileName) {
            return fileName.replace('.html', '');
        }

        // Helper function to handle individual file downloading without opening in a new tab
        async function triggerSingleDownload(fileName, url) {
            try {
                statusMsg.textContent = `Downloading ${fileName}...`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response error.");
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                link.click();
                
                URL.revokeObjectURL(blobUrl);
                statusMsg.textContent = "Download complete!";
                setTimeout(() => statusMsg.textContent = "", 2000);
            } catch (err) {
                console.error(err);
                statusMsg.textContent = `Failed to download ${fileName}`;
            }
        }

        // Generate the UI Grid cards
        gameFiles.forEach(file => {
            const encodedFile = encodeURIComponent(file);
            let downloadUrl = `${baseUrl}${encodedFile}`;

            // Specific link overrides
            if (file === "flappybird.html") {
                downloadUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@f88f3e84a8d064340d136e20c68c497685e569b4/flappybird.html";
            } else if (file === "flappy dunk.html") {
                downloadUrl = "https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/flappy%20dunk/index.html";
            } else if (file === "paperiomania.html") {
                downloadUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@main/paperiomania.html";
            } else if (file === "PAPERio3D.html") {
                downloadUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@main/PAPERio3D.html";
            }

            const card = document.createElement('div');
            card.className = 'card';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'game-title';
            titleDiv.textContent = cleanTitle(file);

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn-download';
            downloadBtn.textContent = 'DOWNLOAD';
            downloadBtn.addEventListener('click', () => triggerSingleDownload(file, downloadUrl));

            card.appendChild(titleDiv);
            card.appendChild(downloadBtn);
            grid.appendChild(card);
        });

        // "Download All" Functionality using JSZip
        document.getElementById('download-all-btn').addEventListener('click', async () => {
            statusMsg.textContent = "Preparing package... Downloading files...";
            const zip = new JSZip();

            try {
                const promises = gameFiles.map(async (file) => {
                    const encodedFile = encodeURIComponent(file);
                    let fetchUrl = `${baseUrl}${encodedFile}`;

                    // Specific link overrides for ZIP
                    if (file === "flappybird.html") {
                        fetchUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@f88f3e84a8d064340d136e20c68c497685e569b4/flappybird.html";
                    } else if (file === "flappy dunk.html") {
                        fetchUrl = "https://cdn.jsdelivr.net/gh/bubbls/youtube-playables@main/flappy%20dunk/index.html";
                    } else if (file === "paperiomania.html") {
                        fetchUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@main/paperiomania.html";
                    } else if (file === "PAPERio3D.html") {
                        fetchUrl = "https://cdn.jsdelivr.net/gh/julianlockibarra-cat/games@main/PAPERio3D.html";
                    }

                    const response = await fetch(fetchUrl);
                    if (!response.ok) throw new Error(`Failed to fetch ${file}`);
                    const blob = await response.blob();
                    zip.file(file, blob);
                });

                await Promise.all(promises);
                statusMsg.textContent = "Generating ZIP file...";

                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "unblockedgames.zip";
                link.click();
                
                statusMsg.textContent = "All files downloaded successfully!";
                setTimeout(() => statusMsg.textContent = "", 4000);

            } catch (error) {
                console.error(error);
                statusMsg.textContent = "Error packaging files. Check console log.";
            }
        });
    </script>
</body>
</html>
